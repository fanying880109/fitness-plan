<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>主理人的居家健身计划</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.55}button,input{font:inherit}.app{max-width:760px;margin:auto;padding:max(14px,env(safe-area-inset-top)) 14px calc(28px + env(safe-area-inset-bottom))}.hero{padding:20px 4px 16px}.eyebrow{margin:0 0 8px;color:#0f766e;font-size:13px;font-weight:800}h1{margin:0;font-size:clamp(28px,8vw,42px);line-height:1.08;letter-spacing:0}.hero p{margin:12px 0 0;color:#667085;font-size:15px}.today{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-top:18px;padding:14px;border:1px solid #dde3ee;border-radius:8px;background:#fff;box-shadow:0 14px 34px rgba(20,30,55,.1)}.today small{display:block;color:#667085;font-weight:800}.today b{display:block;margin-top:3px;font-size:18px}.score{min-width:82px;padding:10px 12px;border-radius:8px;background:#111827;color:#fff;text-align:center}.score strong{display:block;font-size:22px;line-height:1}.score span{font-size:12px;color:rgba(255,255,255,.72)}.tabs-wrap{position:sticky;top:0;z-index:10;margin:8px -14px 16px;padding:10px 14px;border-bottom:1px solid rgba(221,227,238,.78);background:rgba(245,247,251,.94);backdrop-filter:blur(16px)}.tabs{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(58px,1fr);gap:8px;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{min-height:42px;border:1px solid #dde3ee;border-radius:8px;background:#fff;color:#667085;font-size:14px;font-weight:800;white-space:nowrap}.tab.on{border-color:#111827;background:#111827;color:#fff}.card{display:none;overflow:hidden;border:1px solid #dde3ee;border-radius:8px;background:#fff;box-shadow:0 14px 34px rgba(20,30,55,.1)}.card.on{display:block}.head{padding:18px;background:#111827;color:#fff}.meta{display:flex;flex-wrap:wrap;gap:8px}.pill{padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.86);font-size:12px;font-weight:800}.head h2{margin:12px 0 4px;font-size:26px;letter-spacing:0}.head p{margin:0;color:rgba(255,255,255,.74);font-size:14px}.checks{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px;border-bottom:1px solid #dde3ee;background:#f9fbff}.ck{position:relative}.ck input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}.ck span{display:flex;min-height:44px;align-items:center;justify-content:center;border:1px solid #dde3ee;border-radius:8px;background:#fff;color:#667085;font-size:13px;font-weight:800;pointer-events:none}.ck input:checked+span{border-color:rgba(15,118,110,.3);background:#e8f7f1;color:#0f766e}.content{padding:16px}.block{margin:0 0 18px}.block:last-child{margin-bottom:0}.block h3{display:flex;gap:8px;align-items:center;margin:0 0 10px;font-size:18px}.mark{width:9px;height:22px;border-radius:999px;background:#2563eb}.grid{display:grid;gap:10px}.item{padding:13px;border:1px solid #dde3ee;border-radius:8px;background:#fbfcff}.item h4{margin:0 0 6px;font-size:15px}.item p,.item li{color:#667085;font-size:14px}.item p{margin:0}.item ul{margin:6px 0 0;padding-left:18px}.tip{padding:13px;border-radius:8px;background:#eaf1ff;color:#1d3d70;font-size:14px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.action{display:flex;min-height:44px;align-items:center;justify-content:center;border-radius:8px;font-size:14px;font-weight:800;text-decoration:none}.primary{background:#fb7299;color:#fff}.secondary{border:1px solid #dde3ee;color:#172033}.note{margin:18px 2px 0;color:#667085;font-size:13px;text-align:center}@media(min-width:680px){.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<main class="app" id="top">
<section class="hero">
<p class="eyebrow">7 天居家减脂塑形</p>
<h1>主理人的训练计划</h1>
<p>无器械训练、三餐搭配、每日打卡。手机打开就能直接照着练。</p>
<div class="today"><div><small>今天建议</small><b id="today">读取中</b></div><div class="score"><strong id="score">0%</strong><span>本周完成</span></div></div>
</section>
<nav class="tabs-wrap"><div class="tabs" id="tabs"></div></nav>
<section id="cards"></section>
<p class="note">训练强度按当天状态调整；有疼痛或明显不适时先停止。</p>
</main>
<script>
const plan=[
["周一","全身塑形","力量基础","35-40 分钟","中等","建立一周训练节奏，优先保证动作质量。",[["热身激活",["关节活动各 20 秒","开合跳 40 秒","高抬腿 40 秒"]],["全身力量",["深蹲 3 组 x 12-15 次","跪姿俯卧撑 3 组，接近力竭","交替弓步蹲 3 组 x 每侧 10-12 次","平板支撑 3 组 x 30-45 秒","仰卧臀桥 3 组 x 15 次"]],["拉伸放松",["大腿、臀部、胸部和手臂 5 分钟"]]],["水煮蛋 1 个 + 全麦面包 1 片 + 无糖牛奶/豆浆","糙米饭一拳 + 清蒸鸡胸/鱼肉一掌 + 清炒蔬菜","蒸红薯小份 + 豆腐菌菇汤 + 凉拌菠菜"],"力量日是塑形基础。宁可少做几次，也要让臀腿、核心和胸背真正发力。","全身塑形 无器械 跟练"],
["周二","有氧燃脂","心肺","35-40 分钟","中等","保持微喘但能说短句的强度。",[["热身",["关节活动和动态拉伸 5 分钟"]],["持续有氧",["低冲击有氧操，或原地慢跑 + 高抬腿 + 后踢腿组合 30 分钟","全程保持稳定呼吸"]],["拉伸",["大腿后侧、小腿和腰部 5 分钟"]]],["燕麦粥 40g + 鸡蛋 1 个 + 半个水果","杂粮饭一拳 + 烤瘦肉一掌 + 大份蔬菜沙拉","杂粮粥一碗 + 清炒虾仁 + 焯水西兰花"],"有氧日的关键是持续。别把前 5 分钟练得太猛，留一点余量更容易完成。","低冲击有氧 燃脂 跟练"],
["周三","积极恢复","恢复","15-25 分钟","低","让身体恢复，为后半周训练蓄力。",[["轻量活动",["全身拉伸、瑜伽或散步 15-20 分钟","也可以完全休息"]],["呼吸放松",["睡前做 3-5 分钟腹式呼吸"]]],["沿用周一，可把面包换成玉米","沿用周二，可加一份蒸豆腐","清淡为主，可换成冬瓜汤 + 优质蛋白"],"恢复不是偷懒。睡眠、轻拉伸和稳定饮食，会直接影响后面训练的表现。","全身拉伸 瑜伽 放松"],
["周四","上肢 + 核心","手臂腰腹","35 分钟","中等","专注上肢线条和核心稳定。",[["热身",["手臂画圈、肩部环绕、胸椎打开 5 分钟"]],["针对训练",["窄距跪姿俯卧撑 3 组，接近力竭","俯身 YTW 每个字母 2 组 x 10 次","仰卧卷腹 3 组 x 15-20 次","仰卧交替抬腿 3 组 x 每侧 15-20 次","俄罗斯转体 3 组 x 每侧 15 次"]],["拉伸",["胸、肩、腹和背 5 分钟"]]],["无糖酸奶 150g + 坚果 10g + 燕麦片 30g","鸡胸肉沙拉 + 油醋汁","清蒸鲈鱼 + 凉拌秋葵，主食少量或不加"],"核心训练不要用脖子硬拉。慢起慢落，比快速凑次数更有效。","手臂 核心 无器械 跟练"],
["周五","HIIT 燃脂","爆发","30 分钟","高","短时间提高心率，按体感及时降阶。",[["热身",["充分热身 5 分钟"]],["HIIT 循环",["每个动作 40 秒，休息 20 秒","开合跳、深蹲跳、登山式、原地高抬腿","一轮后休息 1 分钟，共 3-4 轮"]],["拉伸",["腿部、髋部和肩颈 5 分钟"]]],["全麦馒头小份 + 鸡蛋 1 个 + 黑咖啡可选","瘦肉炒蔬菜 + 少量米饭","番茄菌菇汤 + 煎鸡胸肉，少油少盐"],"HIIT 强度较高。喘得太厉害就改成低冲击版本，完成比硬撑重要。","低冲击 HIIT 燃脂 跟练"],
["周六","趣味有氧","坚持感","30-40 分钟","自选","选择喜欢的内容，让运动更容易长期坚持。",[["自选有氧",["舞蹈有氧或趣味燃脂操 30-40 分钟","也可以做核心强化，把跳跃减少"]],["轻拉伸",["小腿、臀腿和肩颈 5 分钟"]]],["可以稍丰富，如蔬菜鸡蛋饼","外出可选日式定食：烤鱼 + 米饭 + 味噌汤","正常健康晚餐，七分饱"],"周末不用追求完美，关键是别断掉节奏。喜欢的训练，才最容易坚持。","趣味有氧 减脂操 跟练"],
["周日","完全休息","修复","自由","低","给身体和情绪都留出空白。",[["全天休息",["可散步、泡沫轴放松或轻柔拉伸","不安排正式训练"]],["复盘",["记录完成情况、睡眠、围度和体感变化"]]],["丰富但健康的早餐","正常健康午餐","正常健康晚餐，七分饱"],"休息日是计划的一部分。恢复好了，下周才更有力气继续。","全身放松 拉伸 恢复"]
];
const $=s=>document.querySelector(s),tabs=$("#tabs"),cards=$("#cards"),key=(d,k)=>`fit-v3-${d}-${k}`;
function todayIndex(){let d=new Date().getDay();return d?d-1:6}
function item(title,body){return `<div class="item"><h4>${title}</h4>${Array.isArray(body)?`<ul>${body.map(x=>`<li>${x}</li>`).join("")}</ul>`:`<p>${body}</p>`}</div>`}
function render(){
plan.forEach((d,i)=>{
tabs.insertAdjacentHTML("beforeend",`<button class="tab" data-day="${i}">${d[0]}</button>`);
cards.insertAdjacentHTML("beforeend",`<article class="card" data-day="${i}"><div class="head"><div class="meta"><span class="pill">${d[2]}</span><span class="pill">${d[3]}</span><span class="pill">${d[4]}</span></div><h2>${d[0]} · ${d[1]}</h2><p>${d[5]}</p></div><div class="checks">${["热身","训练","拉伸"].map((x,j)=>`<label class="ck"><input type="checkbox" data-kind="${j}"><span>${x}</span></label>`).join("")}</div><div class="content"><section class="block"><h3><span class="mark"></span>运动计划</h3><div class="grid">${d[6].map(x=>item(x[0],x[1])).join("")}</div><div class="actions"><a class="action primary" target="_blank" rel="noopener" href="https://search.bilibili.com/all?keyword=${encodeURIComponent(d[9])}">B站跟练</a><a class="action secondary" href="#top" data-reset="${i}">清空当天</a></div></section><section class="block"><h3><span class="mark"></span>三餐搭配</h3><div class="grid">${["早餐","午餐","晚餐"].map((m,j)=>item(m,d[7][j])).join("")}</div></section><section class="block"><div class="tip">${d[8]}</div></section></div></article>`);
});
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>show(+b.dataset.day));
document.querySelectorAll(".ck input").forEach(input=>{let c=input.closest(".card"),d=+c.dataset.day,k=input.dataset.kind;input.checked=localStorage.getItem(key(d,k))==="1";input.onchange=()=>{localStorage.setItem(key(d,k),input.checked?"1":"0");score()}});
document.querySelectorAll("[data-reset]").forEach(a=>a.onclick=e=>{e.preventDefault();let c=a.closest(".card"),d=+c.dataset.day;c.querySelectorAll("input").forEach(input=>{input.checked=false;localStorage.removeItem(key(d,input.dataset.kind))});score()});
let t=todayIndex();$("#today").textContent=`${plan[t][0]} · ${plan[t][1]}`;show(t);score()
}
function show(i){document.querySelectorAll(".tab,.card").forEach(el=>el.classList.toggle("on",+el.dataset.day===i))}
function score(){let done=0;plan.forEach((_,d)=>[0,1,2].forEach(k=>{if(localStorage.getItem(key(d,k))==="1")done++}));$("#score").textContent=`${Math.round(done/21*100)}%`}
render();
</script>
</body>
</html>
